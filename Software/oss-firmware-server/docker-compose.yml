version: '3.8'
services:
  firmware-server:
    image: nginx:alpine
    container_name: ossm-firmware-server
    ports:
      - "80:80"
    volumes:
      - ./firmware:/usr/share/nginx/html:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
